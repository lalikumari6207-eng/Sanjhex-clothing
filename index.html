<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANJHEX Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{background:#0b0c10;color:white;}

nav{
display:flex;justify-content:space-between;
padding:15px;background:black;
position:fixed;width:100%;top:0;
}

.logo{font-weight:800;color:#00fff2;}

.hero{
margin-top:60px;
text-align:center;padding:60px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;padding:20px;
}

.card{
background:#111;padding:10px;border-radius:10px;
transition:0.3s;
}
.card:hover{transform:scale(1.03);}

.card img{width:100%;height:200px;object-fit:cover;}

button{
width:100%;margin-top:5px;padding:8px;
border:none;border-radius:20px;
background:linear-gradient(45deg,#ff00cc,#00fff2);
cursor:pointer;
}

/* CART */
.cart{
position:fixed;right:-320px;top:0;
width:300px;height:100%;
background:#111;padding:10px;
transition:.3s;overflow:auto;
}
.cart.open{right:0;}

.cartBtn{
position:fixed;bottom:20px;right:20px;
background:#ff00cc;padding:10px;border-radius:30px;
cursor:pointer;
}

/* ADMIN */
.admin{
display:none;
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;padding:20px;width:300px;
z-index:1000;
}
.admin input,select{
width:100%;margin:5px 0;padding:8px;
}

/* MODAL */
.modal{
display:none;
position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;align-items:center;
}
.modalBox{
background:#111;padding:20px;width:300px;
}
</style>
</head>

<body>

<nav>
<div class="logo">SANJHEX</div>
<div onclick="adminLogin()">👑</div>
</nav>

<div class="hero">
<h1>Luxury Streetwear SANJHEX Show your personality</h1>
</div>

<div class="grid" id="grid"></div>

<div class="cartBtn" onclick="toggleCart()">🛒</div>
<div class="cart" id="cart"></div>

<!-- ADMIN -->
<div class="admin" id="admin">
<h3>Add Product</h3>
<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<select id="pcat">
<option value="men">Men</option>
<option value="women">Women</option>
<option value="combo">Combo</option>
</select>
<button onclick="addProduct()">Add</button>

<div id="adminList"></div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal" id="modal">
<div class="modalBox" id="modalBox"></div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart=[];

/* SAVE */
function save(){
localStorage.setItem("products",JSON.stringify(products));
}

/* RENDER PRODUCTS */
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

products.forEach((p,i)=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}" onclick="openProduct(${i})">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addToCart(${i})">Add to Cart</button>
</div>
`;
});
}

/* PRODUCT VIEW */
function openProduct(i){
let p=products[i];

modal.style.display="flex";
modalBox.innerHTML=`
<h2>${p.name}</h2>
<img src="${p.img}" style="width:100%">
<p>₹${p.price}</p>
<button onclick="addToCart(${i})">Add to Cart</button>
<button onclick="closeModal()">Close</button>
`;
}

function closeModal(){
modal.style.display="none";
}

/* CART */
function addToCart(i){
let found=cart.find(c=>c.name===products[i].name);
if(found){found.qty++;}
else{cart.push({...products[i],qty:1});}
renderCart();
}

function renderCart(){
let box=document.getElementById("cart");

if(cart.length===0){
box.innerHTML="<h3>Cart Empty</h3>";
return;
}

let total=0;
box.innerHTML="<h2>Cart</h2>";

cart.forEach((c,i)=>{
total+=c.price*c.qty;

box.innerHTML+=`
<div>
${c.name} 
<br>
Qty: 
<button onclick="changeQty(${i},-1)">-</button>
${c.qty}
<button onclick="changeQty(${i},1)">+</button>
<br>
₹${c.price*c.qty}
<button onclick="removeItem(${i})">Remove</button>
</div>
`;
});

box.innerHTML+=`<h3>Total ₹${total}</h3>
<button onclick="checkout()">Buy Now</button>`;
}

function changeQty(i,val){
cart[i].qty+=val;
if(cart[i].qty<=0) cart.splice(i,1);
renderCart();
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

/* CHECKOUT */
function checkout(){
alert("Order Placed Successfully ✅");
cart=[];
renderCart();
}

/* ADMIN */
function adminLogin(){
let pass=prompt("Enter Owner Code");
if(pass==="SANJHEX123"){
document.getElementById("admin").style.display="block";
renderAdminList();
}else{
alert("Wrong Code ❌");
}
}

function addProduct(){
if(!pname.value || !pprice.value || !pimg.value){
alert("Fill all fields ❌");
return;
}

products.push({
name:pname.value,
price:Number(pprice.value),
img:pimg.value,
cat:pcat.value
});

pname.value="";
pprice.value="";
pimg.value="";

save();
render();
renderAdminList();
}

function renderAdminList(){
let box=document.getElementById("adminList");
box.innerHTML="<h4>Products</h4>";

products.forEach((p,i)=>{
box.innerHTML+=`
<div>
${p.name} ₹${p.price}
<button onclick="deleteProduct(${i})">Delete</button>
</div>
`;
});
}

function deleteProduct(i){
products.splice(i,1);
save();
render();
renderAdminList();
}

render();

</script>

</body>
</html>
