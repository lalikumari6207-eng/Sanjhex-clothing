<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANJHEX | Premium Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: radial-gradient(circle at top,#111827,#05060a);
color:white;
overflow-x:hidden;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 50px;
background:rgba(10,10,15,0.6);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.08);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:26px;
font-weight:900;
letter-spacing:3px;
background:linear-gradient(45deg,#00fff2,#ff00cc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
padding:10px 16px;
border:none;
border-radius:25px;
cursor:pointer;
font-weight:600;
color:#000;
background:linear-gradient(45deg,#00fff2,#a78bfa);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
padding:30px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
border:1px solid rgba(0,255,242,0.3);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
}

.price{
color:#00fff2;
font-weight:700;
margin-top:6px;
}

.desc{
font-size:12px;
opacity:0.7;
margin-top:5px;
}

/* BUTTON */
.card button{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:20px;
background:linear-gradient(45deg,#ff00cc,#00fff2);
color:white;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
right:15px;
top:100px;
width:240px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.08);
padding:12px;
border-radius:15px;
}

.cart h3{
color:#00fff2;
}

.cart-item{
font-size:12px;
margin-top:5px;
border-bottom:1px solid rgba(255,255,255,0.05);
padding-bottom:3px;
}

/* REVIEWS */
.reviews{
margin-top:10px;
padding-top:10px;
border-top:1px solid rgba(255,255,255,0.08);
}

.star{
color:#ffd700;
font-size:13px;
}

.review-box{
font-size:11px;
opacity:0.8;
margin-top:3px;
}

/* INPUT */
input,textarea{
width:100%;
padding:7px;
margin-top:5px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.07);
color:white;
outline:none;
}

/* ADMIN */
.admin{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(10,10,15,0.95);
padding:18px;
border-radius:15px;
width:320px;
z-index:200;
}

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<nav>
<div class="logo">SANJHEX</div>
<button class="btn" onclick="openAdmin()">Owner Panel</button>
</nav>

<div class="grid" id="grid"></div>

<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartBox"></div>
</div>

<div class="overlay" id="overlay"></div>

<div class="admin" id="admin">
<h3>Owner Login</h3>
<input type="password" id="code" placeholder="Owner Code">

<div id="form" style="display:none;">
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">
<textarea id="desc" placeholder="Description"></textarea>
<button onclick="addProduct()">Add Product</button>
</div>

<button onclick="verify()">Unlock</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];

function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

products.forEach((p,i)=>{

if(!p.reviews) p.reviews=[];

let avg = p.reviews.length
? (p.reviews.reduce((a,b)=>a+b.rating,0)/p.reviews.length).toFixed(1)
: 0;

grid.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<div class="desc">${p.desc}</div>

<div class="reviews">
<div class="star">⭐ ${avg} (${p.reviews.length})</div>

<div id="rev-${i}">
${p.reviews.map(r=>`<div class="review-box">⭐ ${r.rating} - ${r.text}</div>`).join("")}
</div>

<input id="rate-${i}" type="number" min="1" max="5" placeholder="Rating">
<input id="text-${i}" placeholder="Review">
<button onclick="addReview(${i})">Add Review</button>
</div>

<button onclick="addCart(${i})">Add to Cart</button>
</div>
`;
});
}

function addCart(i){
cart.push(products[i]);
let box=document.getElementById("cartBox");
box.innerHTML="";
cart.forEach(c=>{
box.innerHTML+=`<div class="cart-item">${c.name} - ₹${c.price}</div>`;
});
}

function addReview(i){
let r=document.getElementById("rate-"+i).value;
let t=document.getElementById("text-"+i).value;

if(!r || !t) return alert("Fill review");

products[i].reviews.push({rating:Number(r),text:t});
localStorage.setItem("products",JSON.stringify(products));
render();
}

function openAdmin(){
admin.style.display="block";
overlay.style.display="block";
}

function verify(){
if(code.value==="SANJHEX123"){
form.style.display="block";
}else{
alert("Wrong Code");
}
}

function addProduct(){
products.push({
name:name.value,
price:price.value,
img:img.value,
desc:desc.value,
reviews:[]
});

localStorage.setItem("products",JSON.stringify(products));
render();
alert("Product Added");
}

overlay.onclick=()=>{
admin.style.display="none";
overlay.style.display="none";
}

render();
</script>

</body>
</html>
