<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SANJHEX ULTRA LUXE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
html{scroll-behavior:smooth;}
body{
margin:0;
font-family:Poppins;
background:#0a0a0a;
color:white;
}

/* NAV */
nav{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
padding:15px 20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:100;
}

/* HERO SLIDER */
.slider{
height:85vh;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
background-size:cover;
background-position:center;
}

.slide.active{opacity:1;}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

/* CATEGORY */
.section-title{
text-align:center;
padding:40px 20px 10px;
font-size:26px;
font-weight:800;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.cat{
height:300px;
position:relative;
border-radius:15px;
overflow:hidden;
cursor:pointer;
}

.cat img{
width:100%;
height:100%;
object-fit:cover;
transition:0.5s;
}

.cat:hover img{transform:scale(1.1);}

.cat h2{
position:absolute;
bottom:20px;
left:20px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#141414;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card div{padding:10px;}

button{
background:#ff3c3c;
border:none;
color:white;
padding:8px;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

/* CART */
.cart{
position:fixed;
right:-360px;
top:0;
width:320px;
height:100%;
background:#111;
padding:15px;
transition:0.3s;
overflow:auto;
z-index:200;
}
.cart.active{right:0;}

/* ABOUT */
.about{
padding:60px 20px;
text-align:center;
background:#111;
}

/* ADMIN */
.adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:red;
padding:15px;
border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<h3>SANJHEX</h3>
<div onclick="toggleCart()">🛒 <span id="count">0</span></div>
</nav>

<!-- HERO SLIDER -->
<div class="slider">
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1520975693416-35a0c2b3b5c7')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1520975958228-3b6c1b4b2c6a')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1520975922284-9f1b0a2f2a3b')"></div>
<div class="overlay"></div>
</div>

<h2 class="section-title">SHOP BY CATEGORY</h2>

<!-- CATEGORIES -->
<div class="grid">
<div class="cat" onclick="filter('men')">
<img src="https://images.unsplash.com/photo-1520975693416-35a0c2b3b5c7">
<h2>MEN</h2>
</div>

<div class="cat" onclick="filter('women')">
<img src="https://images.unsplash.com/photo-1520975958228-3b6c1b4b2c6a">
<h2>WOMEN</h2>
</div>

<div class="cat" onclick="filter('combo')">
<img src="https://images.unsplash.com/photo-1520975922284-9f1b0a2f2a3b">
<h2>COMBO</h2>
</div>
</div>

<h2 class="section-title">PRODUCTS</h2>

<div class="products" id="products"></div>

<!-- ABOUT -->
<div class="about">
<h2>About SANJHEX</h2>
<p>
Luxury streetwear brand inspired by global fashion culture.
Limited drops, premium quality, bold identity.
</p>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>
</div>

<div class="adminBtn" onclick="admin()">⚙️</div>

<script>
let products=[
{name:"Oversized Tee",price:999,img:"https://images.unsplash.com/photo-1520975693416-35a0c2b3b5c7",cat:"men"},
{name:"Women Dress",price:1299,img:"https://images.unsplash.com/photo-1520975958228-3b6c1b4b2c6a",cat:"women"},
{name:"Couple Set",price:1999,img:"https://images.unsplash.com/photo-1520975922284-9f1b0a2f2a3b",cat:"combo"}
];

let cart=[];

/* SLIDER AUTO */
let i=0;
setInterval(()=>{
let slides=document.querySelectorAll(".slide");
slides.forEach(s=>s.classList.remove("active"));
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

/* RENDER */
function render(list=products){
let box=document.getElementById("products");
box.innerHTML="";
list.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div>
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="add('${p.name}')">Add to Cart</button>
</div>
</div>`;
});
document.getElementById("count").innerText=cart.length;
}

function filter(cat){
render(products.filter(p=>p.cat===cat));
}

function add(name){
cart.push(name);
document.getElementById("count").innerText=cart.length;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
document.getElementById("cartItems").innerHTML =
cart.length?cart.map(c=>`<p>${c}</p>`).join(""):"Cart Empty";
}

function admin(){
let p=prompt("Admin Password");
if(p==="admin123"){
alert("Admin Mode (demo)");
}
}

render();
</script>

</body>
</html>
