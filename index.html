<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SANJHEX PRO STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px;
background:#111;
position:sticky;
top:0;
z-index:100;
}

/* SEARCH */
input{
padding:8px;
border-radius:10px;
border:none;
margin:5px;
width:90%;
}

/* MENU */
.menu{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
}
.menu button{
background:#1a1a1a;
border:none;
padding:8px 15px;
border-radius:20px;
color:white;
cursor:pointer;
transition:0.3s;
}
.menu button:hover{
background:#ff3c3c;
}

/* BANNER */
.banner{
height:180px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:800;
background:linear-gradient(270deg,#ff0000,#ff9900,#ff00ff);
background-size:600% 600%;
animation:move 6s infinite;
}
@keyframes move{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}
.card:hover{transform:scale(1.03)}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

/* BUTTON */
button{
background:#ff3c3c;
border:none;
color:white;
padding:8px;
border-radius:10px;
cursor:pointer;
margin:5px;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#111;
padding:20px;
border-radius:12px;
width:90%;
max-width:400px;
animation:pop 0.25s ease;
}

@keyframes pop{
from{transform:scale(0.8);opacity:0}
to{transform:scale(1);opacity:1}
}

/* ADMIN BTN */
.adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:red;
padding:15px;
border-radius:50%;
cursor:pointer;
}

/* FOOTER */
footer{
background:#111;
padding:20px;
text-align:center;
font-size:12px;
color:#aaa;
margin-top:20px;
}
</style>

</head>

<body>

<header>
<h2>SANJHEX 🔥</h2>
<div onclick="openModal('cartModal')">🛒 <span id="count">0</span></div>
</header>

<!-- BANNER -->
<div class="banner">🔥 LIMITED DROP - SANJHEX 2026 COLLECTION</div>

<!-- SEARCH -->
<div style="text-align:center;padding:10px;">
<input id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div>

<!-- MENU -->
<div class="menu">
<button onclick="filter('all')">All</button>
<button onclick="filter('men')">Men</button>
<button onclick="filter('women')">Women</button>
<button onclick="filter('combo')">Combo</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="box">
<h3>Cart</h3>
<div id="cartItems"></div>
<button onclick="openModal('checkoutModal')">Checkout COD</button>
</div>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
<div class="box">
<h3>COD Order</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<button onclick="placeOrder()">Place Order</button>
</div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
<div class="box">
<h3>Admin Panel</h3>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<select id="pcat">
<option value="men">Men</option>
<option value="women">Women</option>
<option value="combo">Combo</option>
</select>
<input type="file" id="pimg">

<button onclick="addProduct()">Upload Product</button>

<hr>
<div id="orders"></div>
</div>
</div>

<div class="adminBtn" onclick="adminLogin()">⚙️</div>

<footer>
© SANJHEX | Powered by Lyzonix Technologies
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9ERbGEbNoEr-3_CxdC-yzXlKx6UO_iqw",
  authDomain: "sanjhex-55029.firebaseapp.com",
  projectId: "sanjhex-55029",
  storageBucket: "sanjhex-55029.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let products=[];
let cart=[];

/* LOAD */
async function load(){
let snap=await getDocs(collection(db,"products"));
products=[];
snap.forEach(d=>products.push({...d.data(),id:d.id}));
render();
}

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";
products.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div style="padding:10px">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="add('${p.id}')">Add</button>
</div>
</div>`;
});
document.getElementById("count").innerText=cart.length;
}

/* SEARCH */
window.searchProduct=()=>{
let val=document.getElementById("search").value.toLowerCase();
let filtered=products.filter(p=>p.name.toLowerCase().includes(val));
let box=document.getElementById("products");
box.innerHTML="";
filtered.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
</div>`;
});
};

/* FILTER */
window.filter=(cat)=>{
let f=cat==="all"?products:products.filter(p=>p.cat===cat);
let box=document.getElementById("products");
box.innerHTML="";
f.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
</div>`;
});
};

/* CART */
window.add=(id)=>{
cart.push(products.find(p=>p.id==id));
render();
};

window.openModal=(id)=>{
document.getElementById(id).style.display="flex";
};

document.querySelectorAll(".modal").forEach(m=>{
m.onclick=e=>{if(e.target===m)m.style.display="none";}
});

/* ORDER */
window.placeOrder=async()=>{
await addDoc(collection(db,"orders"),{
name:name.value,
phone:phone.value,
address:address.value,
cart,
status:"Pending"
});
alert("Order Placed");
cart=[];
};

/* ADMIN */
window.adminLogin=()=>{
let pass=prompt("Admin Password");
if(pass==="admin123"){
openModal('adminModal');
loadOrders();
}
};

/* ADD PRODUCT */
window.addProduct=async()=>{
let file=pimg.files[0];
let s=ref(storage,"p/"+file.name);
await uploadBytes(s,file);
let url=await getDownloadURL(s);

await addDoc(collection(db,"products"),{
name:pname.value,
price:pprice.value,
cat:pcat.value,
img:url
});

alert("Product Added");
load();
};

/* ORDERS */
async function loadOrders(){
let snap=await getDocs(collection(db,"orders"));
let box=document.getElementById("orders");
box.innerHTML="";
snap.forEach(d=>{
let o=d.data();
box.innerHTML+=`<p>${o.name} - ${o.status}</p>`;
});
}

load();

</script>

</body>
</html>
