<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SANJHEX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#0f0f0f;color:white}

/* NAV */
header{
display:flex;
justify-content:space-between;
padding:15px;
background:#111;
position:sticky;
top:0;
z-index:10;
}

/* MENU */
.menu{
display:flex;
gap:10px;
padding:10px;
background:#1a1a1a;
justify-content:center;
}
.menu button{background:#222;border:none;color:white;padding:8px;border-radius:20px;cursor:pointer}

/* BANNER */
.banner{
height:200px;
background:linear-gradient(45deg,#ff3c3c,#111);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:800;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
padding:10px;
}

.card img{width:100%;height:180px;object-fit:cover;border-radius:10px}

/* BUTTON */
button{
background:#ff3c3c;
border:none;
color:white;
padding:8px;
border-radius:10px;
cursor:pointer;
margin:5px;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000000cc;
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1a1a1a;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

/* ADMIN */
.adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:red;
padding:15px;
border-radius:50%;
cursor:pointer;
}

/* FOOTER */
footer{
background:#111;
padding:20px;
text-align:center;
margin-top:20px;
font-size:12px;
color:#aaa;
}
</style>

</head>

<body>

<header>
<h2>SANJHEX 🔥</h2>
<div onclick="openCart()">🛒 <span id="count">0</span></div>
</header>

<!-- BANNER -->
<div class="banner" id="banner">NEW DROP 🔥 SANJHEX</div>

<!-- MENU -->
<div class="menu">
<button onclick="filter('all')">All</button>
<button onclick="filter('men')">Men</button>
<button onclick="filter('women')">Women</button>
<button onclick="filter('combo')">Combo</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="box">
<h3>Cart</h3>
<div id="cartItems"></div>
<button onclick="checkout()">Checkout COD</button>
</div>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
<div class="box">
<h3>COD Order</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<button onclick="placeOrder()">Place Order</button>
</div>
</div>

<!-- ADMIN LOGIN -->
<div class="modal" id="loginModal">
<div class="box">
<h3>Admin Login</h3>
<input id="pass" type="password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
<div class="box">

<h3>Admin Panel</h3>

<h4>Add Product (Image Upload)</h4>
<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<select id="pcat">
<option value="men">Men</option>
<option value="women">Women</option>
<option value="combo">Combo</option>
</select>
<input type="file" id="pimg">

<button onclick="addProduct()">Upload Product</button>

<hr>

<h4>Orders</h4>
<div id="orders"></div>

</div>
</div>

<div class="adminBtn" onclick="openLogin()">⚙️</div>

<footer>
© SANJHEX | Powered by Lyzonix Technologies  
<br>
Big Fashion Store | Streetwear Brand India
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9ERbGEbNoEr-3_CxdC-yzXlKx6UO_iqw",
  authDomain: "sanjhex-55029.firebaseapp.com",
  projectId: "sanjhex-55029",
  storageBucket: "sanjhex-55029.firebasestorage.app",
  messagingSenderId: "176625898797",
  appId: "1:176625898797:web:0ef3ffbf408df2146bafa4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let products=[];
let cart=[];

/* LOAD PRODUCTS */
async function load(){
let snap=await getDocs(collection(db,"products"));
products=[];
snap.forEach(d=>{
products.push({...d.data(),id:d.id});
});
render();
}

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";
products.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="add('${p.id}')">Add Cart</button>
</div>`;
});
document.getElementById("count").innerText=cart.length;
}

/* FILTER */
window.filter=(cat)=>{
let filtered=cat==="all"?products:products.filter(p=>p.cat===cat);
let box=document.getElementById("products");
box.innerHTML="";
filtered.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
</div>`;
});
}

/* CART */
window.add=(id)=>{
cart.push(products.find(p=>p.id==id));
render();
};

window.openCart=()=>{
document.getElementById("cartModal").style.display="flex";
let box=document.getElementById("cartItems");
box.innerHTML="";
if(cart.length==0){box.innerHTML="Empty Cart";}
cart.forEach(c=>{
box.innerHTML+=`<p>${c.name}</p>`;
});
};

window.checkout=()=>{
document.getElementById("checkoutModal").style.display="flex";
};

/* ORDER */
window.placeOrder=async()=>{
await addDoc(collection(db,"orders"),{
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
address:document.getElementById("address").value,
cart,
status:"Pending"
});
alert("Order Placed");
cart=[];
};

/* LOGIN */
window.openLogin=()=>document.getElementById("loginModal").style.display="flex";

window.login=()=>{
if(document.getElementById("pass").value==="admin123"){
document.getElementById("adminModal").style.display="flex";
loadOrders();
}
};

/* ADD PRODUCT WITH IMAGE */
window.addProduct=async()=>{
let file=document.getElementById("pimg").files[0];
let storageRef=ref(storage,"products/"+file.name);
await uploadBytes(storageRef,file);
let url=await getDownloadURL(storageRef);

await addDoc(collection(db,"products"),{
name:document.getElementById("pname").value,
price:document.getElementById("pprice").value,
cat:document.getElementById("pcat").value,
img:url
});

alert("Product Added");
load();
};

/* ORDERS */
async function loadOrders(){
let snap=await getDocs(collection(db,"orders"));
let box=document.getElementById("orders");
box.innerHTML="";
snap.forEach(d=>{
let o=d.data();
box.innerHTML+=`<p>${o.name} - ${o.status}</p>`;
});
}

load();

</script>

</body>
</html>
