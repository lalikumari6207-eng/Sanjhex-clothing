<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANJHEX | Luxury Streetwear</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#05060a;
color:white;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* ANIMATED BACKGROUND */
body::before{
content:"";
position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 20%,rgba(255,0,204,0.15),transparent 40%),
radial-gradient(circle at 80% 30%,rgba(0,255,242,0.12),transparent 40%),
radial-gradient(circle at 50% 80%,rgba(168,85,247,0.10),transparent 40%);
animation:bgMove 10s infinite alternate;
z-index:-1;
}

@keyframes bgMove{
0%{transform:translate(0,0) scale(1);}
100%{transform:translate(50px,30px) scale(1.1);}
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
z-index:1000;
}

.logo{
font-size:24px;
font-weight:900;
background:linear-gradient(45deg,#00fff2,#ff00cc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.menu{font-size:26px;cursor:pointer;}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
animation:glow 2s infinite alternate;
}

.hero span{color:#ff00cc;}

@keyframes glow{
0%{text-shadow:0 0 10px rgba(255,0,204,0.3);}
100%{text-shadow:0 0 30px rgba(0,255,242,0.5);}
}

/* BLOCKS */
.block{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
cursor:pointer;
opacity:0;
transform:translateY(50px);
transition:0.8s;
}

.block.show{
opacity:1;
transform:translateY(0);
}

.block img{
width:340px;
border-radius:20px;
margin-top:15px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
transition:0.4s;
}

.block img:hover{
transform:scale(1.05);
}

.block h2{
font-size:42px;
background:linear-gradient(45deg,#00fff2,#ff00cc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* PRODUCTS */
.products{
padding:80px 20px;
display:none;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
transition:0.4s;
opacity:0;
transform:translateY(40px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:translateY(-10px) scale(1.03);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:12px;
}

.price{color:#00fff2;font-weight:700;margin-top:5px;}

.card button{
margin-top:6px;
width:100%;
padding:7px;
border:none;
border-radius:20px;
cursor:pointer;
background:linear-gradient(45deg,#ff00cc,#00fff2);
}

/* CART */
.cart{
position:fixed;
right:15px;
top:90px;
width:240px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
padding:12px;
border-radius:15px;
z-index:999;
}

.cart h3{color:#00fff2;}
.cart-item{font-size:12px;margin-top:5px;}

/* ADMIN */
.admin{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:15px;
width:320px;
z-index:3000;
}

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:2000;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
border:none;
border-radius:8px;
background:#1a1a1a;
color:white;
}

button{cursor:pointer;}
</style>
</head>

<body>

<nav>
<div class="logo">SANJHEX</div>
<div class="menu" onclick="openAdmin()">☰</div>
</nav>

<div class="hero">
<h1>Wear Your <span>Attitude</span></h1>
<p>Luxury Streetwear Brand | COD Only</p>
</div>

<div class="block" onclick="openProducts('men')">
<h2>MEN</h2>
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
</div>

<div class="block" onclick="openProducts('women')">
<h2>WOMEN</h2>
<img src="https://images.unsplash.com/photo-1520975928318-4d5a5d3c7bde">
</div>

<div class="block" onclick="openProducts('combo')">
<h2>COMBO</h2>
<img src="https://images.unsplash.com/photo-1520975869018-2f2e7c8d1b6c">
</div>

<div class="products" id="productPage">
<h2 style="text-align:center;color:#00fff2;">PRODUCTS</h2>
<div class="grid" id="grid"></div>
</div>

<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartBox"></div>
</div>

<div class="overlay" id="overlay"></div>

<div class="admin" id="admin">
<h3>Owner Login</h3>
<input type="password" id="code" placeholder="Owner Code">

<div id="panel" style="display:none;">
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">

<select id="cat">
<option>men</option>
<option>women</option>
<option>combo</option>
</select>

<input id="discount" placeholder="Discount %">

<button onclick="saveProduct()">Save Product</button>
</div>

<button onclick="verify()">Unlock</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];
let editIndex = -1;
let currentCat="men";

/* SAVE */
function save(){
localStorage.setItem("products",JSON.stringify(products));
}

/* RENDER */
function render(cat){
let grid=document.getElementById("grid");
grid.innerHTML="";

products.filter(p=>p.cat===cat).forEach((p,i)=>{

let finalPrice = p.price - (p.price*p.discount/100);

grid.innerHTML+=`
<div class="card">
<img src="${p.img}">
${p.discount>0?`<div style="color:#ff00cc;font-weight:bold;">🔥 ${p.discount}% OFF</div>`:""}
<h3>${p.name}</h3>

<div class="price">
₹${finalPrice}
<span style="text-decoration:line-through;opacity:0.5;font-size:12px;">₹${p.price}</span>
</div>

<button onclick="addCart(${i})">Add to Cart</button>
<button onclick="editProduct(${i})">Edit</button>
<button onclick="deleteProduct(${i})" style="background:red;">Delete</button>
</div>
`;
});
}

/* CATEGORY */
function openProducts(cat){
currentCat=cat;
document.getElementById("productPage").style.display="block";
render(cat);
}

/* CART */
function addCart(i){
cart.push(products[i]);
document.getElementById("cartBox").innerHTML=
cart.map(c=>`<div class="cart-item">${c.name} - ₹${c.price}</div>`).join("");
}

/* DELETE */
function deleteProduct(i){
products.splice(i,1);
save();
render(currentCat);
}

/* EDIT */
function editProduct(i){
openAdmin();
editIndex=i;

name.value=products[i].name;
price.value=products[i].price;
img.value=products[i].img;
cat.value=products[i].cat;
discount.value=products[i].discount;

panel.style.display="block";
}

/* SAVE PRODUCT */
function saveProduct(){

let obj={
name:name.value,
price:Number(price.value),
img:img.value,
cat:cat.value,
discount:Number(discount.value)||0
};

if(editIndex>-1){
products[editIndex]=obj;
editIndex=-1;
}else{
products.push(obj);
}

save();
render(cat.value);
alert("Saved!");
}

/* ADMIN */
function openAdmin(){
admin.style.display="block";
overlay.style.display="block";
}

function verify(){
if(code.value==="SANJHEX123"){
panel.style.display="block";
}
else alert("Wrong Code");
}

overlay.onclick=()=>{
admin.style.display="none";
overlay.style.display="none";
}

function reveal(){
document.querySelectorAll(".block,.card").forEach(el=>{
let top=el.getBoundingClientRect().top;
if(top<window.innerHeight-80){
el.classList.add("show");
}
});
}

window.addEventListener("scroll",reveal);
window.addEventListener("load",reveal);

render("men");

</script>

</body>
</html>
