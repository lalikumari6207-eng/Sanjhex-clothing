<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANJHEX </title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#05060a;color:white;overflow-x:hidden}

/* NAV */
nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:12px 15px;
background:#000;
z-index:1000;
}
.logo{color:#00fff2;font-weight:800;}
.menu{cursor:pointer;font-size:22px}

/* SALE */
.sale{
margin-top:55px;
text-align:center;
padding:8px;
font-weight:800;
background:linear-gradient(90deg,red,yellow,green,blue);
background-size:300%;
animation:flow 3s linear infinite;
}
@keyframes flow{0%{background-position:0%}100%{background-position:100%}}

/* HERO */
.hero{text-align:center;padding:25px}
.hero span{color:#ff00cc}

/* CATEGORY */
.category{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;padding:15px
}
.cat{
background:#111;border-radius:10px;overflow:hidden;cursor:pointer
}
.cat img{width:100%;height:160px;object-fit:cover}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;padding:15px
}

.card{
background:#111;
padding:10px;
border-radius:10px;
}
.card img{width:100%;height:180px;object-fit:cover}

button{
width:100%;
margin-top:5px;
padding:8px;
border:none;
border-radius:20px;
background:linear-gradient(45deg,#ff00cc,#00fff2);
color:white;
cursor:pointer
}

/* CART */
.cartBtn{
position:fixed;top:15px;right:15px;
background:#ff00cc;
padding:10px;border-radius:50%;
cursor:pointer;z-index:2000
}

.cart{
position:fixed;right:-350px;top:0;
width:320px;height:100%;
background:#111;
padding:10px;
transition:.3s;
overflow:auto;
z-index:3000
}
.cart.open{right:0}

/* MODAL */
.modal{
display:none;
position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:4000
}
.modalBox{
background:#111;
padding:15px;
width:300px;
border-radius:10px
}

/* CHECKOUT */
.checkout{
display:none;
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:15px;
width:300px;
z-index:5000
}
.checkout input{
width:100%;
margin:5px 0;
padding:8px
}

/* ADMIN */
.admin{
display:none;
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:15px;
width:320px;
z-index:6000
}
.admin input,select{
width:100%;
margin:5px 0;
padding:8px
}

/* ABOUT */
.about{text-align:center;padding:30px}

/* FOOTER */
footer{
text-align:center;
padding:15px;
background:#000
}
</style>
</head>

<body>

<nav>
<div class="logo">SANJHEX</div>
<div class="menu" onclick="toggleAdmin()">☰</div>
</nav>

<div class="cartBtn" onclick="toggleCart()">🛒</div>

<div class="sale">🔥 UPTO 50% OFF | LIMITED TIME SALE 🔥</div>

<div class="hero">
<h1>Wear Your <span>Attitude</span></h1>
</div>

<div class="category">
<div class="cat" onclick="setCat('all')"><img src="https://images.unsplash.com/photo-1520975916090-3105956dac38"></div>
<div class="cat" onclick="setCat('men')"><img src="https://images.unsplash.com/photo-1520975928318-4d5a5d3c7bde"></div>
<div class="cat" onclick="setCat('women')"><img src="https://images.unsplash.com/photo-1520975869018-8c3c5c0c2f6c"></div>
</div>

<div class="grid" id="grid"></div>

<div class="cart" id="cart"></div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
<div class="modalBox" onclick="event.stopPropagation()"></div>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkout">
<h3>Checkout</h3>
<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<button onclick="placeOrder()">Place Order</button>
</div>

<!-- ADMIN -->
<div class="admin" id="admin">
<h3>Admin Panel</h3>
<input id="code" placeholder="Enter Code">
<button onclick="loginAdmin()">Login</button>

<div id="panel" style="display:none">
<h4>Add Product</h4>
<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<select id="pcat">
<option value="men">Men</option>
<option value="women">Women</option>
<option value="combo">Combo</option>
</select>
<button onclick="addProduct()">Add</button>

<h4>Orders</h4>
<div id="orders"></div>
</div>
</div>

<div class="about">
<h2>About SANJHEX</h2>
<p>Luxury streetwear brand built for modern youth identity.</p>
</div>

<footer>© 2026 SANJHEX | Lyzonix Technologies</footer>

<script>

/* DATA */
let products=[
{id:1,cat:"men",name:"Men Streetwear",price:1999,img:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
{id:2,cat:"women",name:"Women Streetwear",price:1799,img:"https://images.unsplash.com/photo-1520975928318-4d5a5d3c7bde"},
{id:3,cat:"combo",name:"Couple Combo",price:2999,img:"https://images.unsplash.com/photo-1520975869018-4d5a5d3c7bde"}
];

let cart=[];
let cat="all";
let orders=JSON.parse(localStorage.getItem("orders"))||[];

/* CATEGORY */
function setCat(c){
cat=c;
render();
}

/* PRODUCTS */
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

let list=products.filter(p=>cat==="all"||p.cat===cat);

list.forEach(p=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}" onclick="openProduct(${p.id})">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addCart(${p.id})">Add</button>
</div>`;
});
}

/* FIND PRODUCT */
function find(id){
return products.find(p=>p.id===id);
}

/* MODAL */
function openProduct(id){
let p=find(id);
modal.style.display="flex";
document.querySelector(".modalBox").innerHTML=`
<h3>${p.name}</h3>
<img src="${p.img}" style="width:100%">
<p>₹${p.price}</p>
<button onclick="addCart(${p.id})">Add to Cart</button>
`;
}
function closeModal(){modal.style.display="none";}

/* CART */
function addCart(id){
let item=find(id);
let f=cart.find(c=>c.id===id);
if(f) f.qty++;
else cart.push({...item,qty:1});
renderCart();
}

function renderCart(){
let box=document.getElementById("cart");

if(cart.length===0){
box.innerHTML="<h3>Cart Empty</h3>";
return;
}

let total=0;
box.innerHTML="<h3>Cart</h3>";

cart.forEach((c,i)=>{
total+=c.price*c.qty;
box.innerHTML+=`
<div>
${c.name} x${c.qty}
<br>₹${c.price*c.qty}
<button onclick="remove(${i})">Remove</button>
</div>`;
});

box.innerHTML+=`
<h3>Total ₹${total}</h3>
<button onclick="openCheckout()">Checkout</button>`;
}

function remove(i){
cart.splice(i,1);
renderCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

/* CHECKOUT */
function openCheckout(){
checkout.style.display="block";
}

function placeOrder(){
orders.push({
name:name.value,
address:address.value,
phone:phone.value,
email:email.value,
time:new Date().toLocaleString()
});

localStorage.setItem("orders",JSON.stringify(orders));

alert("🎉 Order Successful!");
checkout.style.display="none";
cart=[];
renderCart();
}

/* ADMIN */
function toggleAdmin(){
admin.style.display="block";
}

function loginAdmin(){
if(code.value==="SANJHEX123"){
panel.style.display="block";
showOrders();
}
}

function addProduct(){
products.push({
id:Date.now(),
name:pname.value,
price:+pprice.value,
img:pimg.value,
cat:pcat.value
});
render();
}

/* ORDERS */
function showOrders(){
let box=document.getElementById("orders");
box.innerHTML="";
orders.forEach(o=>{
box.innerHTML+=`
<div style="border:1px solid #333;margin:5px;padding:5px">
${o.name}<br>${o.phone}<br>${o.address}
</div>`;
});
}

render();

</script>

</body>
</html>
