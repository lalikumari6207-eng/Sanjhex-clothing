<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SANJHEX ULTRA PRO MAX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
html{scroll-behavior:smooth;}
body{
margin:0;
font-family:Poppins;
background:#0b0b0b;
color:white;
}

/* NAV */
nav{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
padding:15px 20px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:100;
}

/* HERO */
.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(120deg,#ff0000,#ff9900,#ff00ff);
background-size:400% 400%;
animation:grad 6s infinite;
}

@keyframes grad{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* SALE */
.sale{
background:red;
white-space:nowrap;
overflow:hidden;
padding:8px;
}
.sale span{
display:inline-block;
animation:move 10s linear infinite;
}
@keyframes move{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* CATEGORY */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.cat{
position:relative;
height:280px;
border-radius:15px;
overflow:hidden;
cursor:pointer;
}
.cat img{
width:100%;
height:100%;
object-fit:cover;
transition:0.4s;
}
.cat:hover img{transform:scale(1.05)}
.cat h2{
position:absolute;
bottom:15px;
left:15px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#151515;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}
.card:hover{transform:translateY(-5px)}
.card img{
width:100%;
height:180px;
object-fit:cover;
}
.card div{padding:10px}

button{
background:#ff3c3c;
border:none;
color:white;
padding:8px;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

/* CART */
.cart{
position:fixed;
right:-360px;
top:0;
width:320px;
height:100%;
background:#111;
padding:15px;
transition:0.3s;
overflow:auto;
z-index:200;
}
.cart.active{right:0}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#111;
padding:20px;
border-radius:12px;
width:90%;
max-width:400px;
}

/* ADMIN */
.adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:red;
padding:15px;
border-radius:50%;
cursor:pointer;
}
input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}
</style>
</head>

<body>

<nav>
<h3>SANJHEX</h3>
<div onclick="toggleCart()">🛒 <span id="count">0</span></div>
</nav>

<div class="sale">
<span>🔥 SANJHEX LIVE DROP - UPTO 50% OFF - LIMITED STOCK 🔥</span>
</div>

<div class="hero">
<h1>SANJHEX ULTRA PRO MAX</h1>
<p>Luxury Streetwear • Premium Drops • Modern Fashion</p>
</div>

<!-- CATEGORY -->
<div class="grid">
<div class="cat" onclick="filter('men')">
<img src="https://images.unsplash.com/photo-1520975693416-35a0c2b3b5c7">
<h2>MEN</h2>
</div>

<div class="cat" onclick="filter('women')">
<img src="https://images.unsplash.com/photo-1520975958228-3b6c1b4b2c6a">
<h2>WOMEN</h2>
</div>

<div class="cat" onclick="filter('combo')">
<img src="https://images.unsplash.com/photo-1520975922284-9f1b0a2f2a3b">
<h2>COMBO</h2>
</div>
</div>

<h2 style="text-align:center">PRODUCTS</h2>
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
<div class="box">
<h3>Admin Panel</h3>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<select id="pcat">
<option value="men">Men</option>
<option value="women">Women</option>
<option value="combo">Combo</option>
</select>

<button onclick="addProduct()">Add Product</button>
</div>
</div>

<div class="adminBtn" onclick="admin()">⚙️</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
});

const db = getFirestore(app);

let products=[];
let cart=[];

  /* PRODUCT */
  products.push({
name: "Soft Pink Aesthetic Top",
price: 899,
img: "./00000000233072069f6950b343c9d19b.png",
cat: "women",
brand: "Sanjhex",
desc: "Luxury streetwear top, cotton fabric, all size available"
});

/* LOAD */
async function load(){
let snap = await getDocs(collection(db,"products"));
products=[];
snap.forEach(d=>products.push({...d.data(),id:d.id}));
render();
}

/* RENDER */
function render(list=products){
let box=document.getElementById("products");
box.innerHTML="";
list.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div>
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="add('${p.id}')">Add</button>
</div>
</div>`;
});
document.getElementById("count").innerText=cart.length;
}

  function render(list=products){
let box=document.getElementById("products");
box.innerHTML="";

list.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}" onerror="this.src='https://via.placeholder.com/300'">
<div style="padding:10px">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<p style="font-size:12px;opacity:0.7">${p.desc}</p>

<button onclick='add(${JSON.stringify(p)})'>
Add to Cart
</button>

</div>
</div>`;
});
  }
/* FILTER */
window.filter=(cat)=>{
render(products.filter(p=>p.cat===cat));
};

/* CART */
window.add=(id)=>{
cart.push(products.find(p=>p.id==id));
render();
};

window.toggleCart=()=>{
document.getElementById("cart").classList.toggle("active");
document.getElementById("cartItems").innerHTML =
cart.length ? cart.map(c=>`<p>${c.name} - ₹${c.price}</p>`).join("") : "Cart Empty";
};

/* ADMIN */
window.admin=()=>{
let pass=prompt("Admin Password");
if(pass==="admin123"){
document.getElementById("adminModal").style.display="flex";
}
};

/* ADD PRODUCT (NO STORAGE) */
window.addProduct=async()=>{
await addDoc(collection(db,"products"),{
name:pname.value,
price:pprice.value,
img:pimg.value,
cat:pcat.value
});

alert("Product Added");
load();
};

load();

</script>

</body>
</html>
