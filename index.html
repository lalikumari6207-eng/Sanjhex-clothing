<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SANJHEX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px;
background:#111;
position:sticky;
top:0;
z-index:100;
}

/* SEARCH */
.search{
text-align:center;
padding:10px;
}
.search input{
padding:10px;
width:80%;
border-radius:10px;
border:none;
}

/* SALE */
.sale{
background:linear-gradient(90deg,#ff0000,#ff9900,#ff00ff);
padding:8px;
overflow:hidden;
white-space:nowrap;
}
.sale span{
display:inline-block;
animation:move 10s linear infinite;
}
@keyframes move{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* BANNER */
.banner{
height:180px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-weight:800;
background:linear-gradient(270deg,#ff0000,#ff9900,#ff00ff);
background-size:600% 600%;
animation:grad 6s infinite;
}
@keyframes grad{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}
.card:hover{transform:scale(1.03)}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card div{
padding:10px;
}

/* BUTTON */
button{
background:#ff3c3c;
border:none;
color:white;
padding:8px;
border-radius:8px;
cursor:pointer;
margin:3px;
}

/* CART DRAWER */
.cart{
position:fixed;
right:-400px;
top:0;
width:320px;
height:100%;
background:#111;
transition:0.3s;
padding:15px;
overflow:auto;
z-index:200;
}
.cart.active{right:0}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}
.box{
background:#111;
padding:20px;
border-radius:12px;
width:90%;
max-width:420px;
}

/* ADMIN BTN */
.adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:red;
padding:15px;
border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>SANJHEX 🔥</h2>
<div onclick="toggleCart()">🛒 <span id="count">0</span></div>
</header>

<div class="sale">
<span>🔥 LIMITED DROP - UPTO 50% OFF - SANJHEX LIVE NOW 🔥</span>
</div>

<div class="banner">SANJHEX LUXURY STREETWEAR</div>

<div class="search">
<input id="search" placeholder="Search products..." onkeyup="search()">
</div>

<div class="products" id="products"></div>

<!-- CART DRAWER -->
<div class="cart" id="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<button onclick="checkout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
<div class="box">
<h3>COD Order</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<button onclick="placeOrder()">Place Order</button>
</div>
</div>

<!-- PRODUCT DETAIL -->
<div class="modal" id="detailModal">
<div class="box">
<img id="dimg" style="width:100%;border-radius:10px">
<h3 id="dname"></h3>
<p id="dprice"></p>
<p id="ddesc">Premium streetwear quality product.</p>
<button onclick="addFromDetail()">Add to Cart</button>
</div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
<div class="box">
<h3>Admin Panel</h3>
<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>

<hr>
<div id="orders"></div>
</div>
</div>

<div class="adminBtn" onclick="admin()">⚙️</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyA9ERbGEbNoEr-3_CxdC-yzXlKx6UO_iqw",
authDomain:"sanjhex-55029.firebaseapp.com",
projectId:"sanjhex-55029"
});

const db=getFirestore(app);

let products=[],cart=[];
let currentProduct=null;

/* LOAD */
async function load(){
let snap=await getDocs(collection(db,"products"));
products=[];
snap.forEach(d=>products.push({...d.data(),id:d.id}));
render();
}

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";
products.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}" onclick='openDetail("${p.id}")'>
<div>
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="add('${p.id}')">Add</button>
</div>
</div>`;
});
document.getElementById("count").innerText=cart.length;
}

/* SEARCH */
window.search=()=>{
let v=document.getElementById("search").value.toLowerCase();
let f=products.filter(p=>p.name.toLowerCase().includes(v));
document.getElementById("products").innerHTML="";
f.forEach(p=>{
document.getElementById("products").innerHTML+=`
<div class="card">
<img src="${p.img}">
<div><h4>${p.name}</h4><p>₹${p.price}</p></div>
</div>`;
});
};

/* CART */
window.add=(id)=>{
cart.push(products.find(p=>p.id==id));
render();
};

window.toggleCart=()=>{
document.getElementById("cart").classList.toggle("active");
updateCart();
};

function updateCart(){
let box=document.getElementById("cartItems");
if(cart.length==0){box.innerHTML="Cart Empty";}
else{
box.innerHTML=cart.map(c=>`<p>${c.name} - ₹${c.price}</p>`).join("");
}
}

/* DETAIL */
window.openDetail=(id)=>{
currentProduct=products.find(p=>p.id==id);
dimg.src=currentProduct.img;
dname.innerText=currentProduct.name;
dprice.innerText="₹"+currentProduct.price;
document.getElementById("detailModal").style.display="flex";
};

window.addFromDetail=()=>{
cart.push(currentProduct);
render();
document.getElementById("detailModal").style.display="none";
};

/* CHECKOUT */
window.checkout=()=>{
document.getElementById("checkoutModal").style.display="flex";
};

window.placeOrder=async()=>{
await addDoc(collection(db,"orders"),{
name:name.value,
phone:phone.value,
address:address.value,
cart,
status:"Pending"
});
alert("Order Placed");
cart=[];
render();
};

/* ADMIN */
window.admin=()=>{
let p=prompt("Admin Password");
if(p==="admin123"){
document.getElementById("adminModal").style.display="flex";
loadOrders();
}
};

/* ADD PRODUCT */
window.addProduct=async()=>{
await addDoc(collection(db,"products"),{
name:pname.value,
price:pprice.value,
img:pimg.value
});
alert("Added");
load();
};

/* ORDERS */
async function loadOrders(){
let snap=await getDocs(collection(db,"orders"));
let box=document.getElementById("orders");
box.innerHTML="";
snap.forEach(d=>{
let o=d.data();
box.innerHTML+=`<p>${o.name} - ${o.status}</p>`;
});
}

load();

</script>

</body>
</html>
